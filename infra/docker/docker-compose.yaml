services:
  rockit-serve:
    build:
      context: ../../
      dockerfile: packages/rockit-serve/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ROCKIT_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
