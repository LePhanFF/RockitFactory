services:
  rockit-serve:
    build:
      context: ../../
      dockerfile: packages/rockit-serve/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ROCKIT_ENV=development
    volumes:
      - ../../packages:/app/packages
    command: ["uv", "run", "uvicorn", "rockit_serve.app:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
