# Strategy configuration for the Rockit platform.
# Each strategy can be enabled/disabled and configured with entry/stop/target models.

# Core strategies (proven profitable, Phase 1a)
core_strategies:
  trend_bull:
    enabled: true
    description: "Trend Day Bull — 15m EMA-aligned VWAP/EMA pullback, 40pt stop, 100pt target"
    day_types: [all]
    direction: long
    trail:
      enabled: false         # 100pt target on trend days needs patience — trail kills the move

  trend_bear:
    enabled: true
    description: "Trend Day Bear — 15m EMA-aligned VWAP/EMA rejection, 50pt stop, 125pt target"
    day_types: [all]
    direction: short
    trail:
      enabled: false         # 125pt target on trend days needs patience — trail kills the move

  super_trend_bull:
    enabled: false
    description: "Super Trend Bull — >2.0x IB extension breakout"
    day_types: [Trend]
    direction: long

  super_trend_bear:
    enabled: false
    description: "Super Trend Bear — strong bearish breakout"
    day_types: [Trend]
    direction: short

  p_day:
    enabled: false
    description: "P-Day — 0.5-1.0x IB extension, skewed structure"
    day_types: [PDay]
    direction: both

  b_day:
    enabled: true
    description: "Balance Day — mean reversion within IB range"
    day_types: [BDay]
    direction: both
    trail:
      enabled: false         # study showed trailing hurts B-Day (mean reversion needs room)

  eighty_percent_rule:
    enabled: true
    description: "80% Rule — mean reversion to Value Area after 80p breakout"
    day_types: [BDay, Neutral]
    direction: both
    trail:
      enabled: false         # study showed trailing hurts 80P (wide stop strategy)

  mean_reversion_vwap:
    enabled: false
    description: "Mean Reversion VWAP — VA/VWAP pullback entries (not from report)"
    day_types: [BDay, Neutral]
    direction: both

  orb_enhanced:
    enabled: false
    description: "Open Range Breakout Enhanced — 60-min range breakout with filters"
    day_types: [Trend, PDay]
    direction: both

  or_reversal:
    enabled: true
    description: "Opening Range Reversal (Judas Swing) — sweep + reversal at open"
    day_types: [all]
    direction: both
    trail:
      enabled: true
      atr_period: 15
      activate_mult: 1.5    # activate after 1.5x ATR(15) favorable move (~29pts)
      trail_mult: 0.5       # trail 0.5x ATR(15) behind HWM (~10pts)

  or_acceptance:
    enabled: true
    description: "OR Acceptance v3 — level break + limit retest at acceptance level"
    day_types: [all]
    direction: both
    trail:
      enabled: true
      atr_period: 15
      activate_mult: 1.5    # activate after 1.5x ATR(15) favorable move (~29pts)
      trail_mult: 0.5       # trail 0.5x ATR(15) behind HWM (~10pts)

  twenty_percent_rule:
    enabled: true
    description: "20P IB Extension — 3x5-min acceptance beyond IB boundary, 2xATR stop, 2R target"
    day_types: [all]
    direction: both
    trail:
      enabled: false         # study showed trailing hurts 20P (cuts wide-stop winners)

# Research strategies (Phase 1b)
research_strategies:
  neutral_day:
    enabled: false
    description: "Neutral Day — no specific signals (pass-through)"
    day_types: [Neutral]
    direction: both

  pm_morph:
    enabled: false
    description: "PM Morph — breakout into PM session after flat AM"
    day_types: [BDay, Neutral]
    direction: both

  morph_to_trend:
    enabled: false
    description: "Morph to Trend — AM balance transitioning to PM breakout"
    day_types: [BDay]
    direction: both

  orb_vwap_breakout:
    enabled: false
    description: "ORB + VWAP — breakout with VWAP confluence"
    day_types: [Trend, PDay]
    direction: both

  ema_trend_follow:
    enabled: false
    description: "EMA Trend Follow — pullback to EMA20/50, momentum entry"
    day_types: [Trend]
    direction: both

  liquidity_sweep:
    enabled: false
    description: "Liquidity Sweep — trap inversion entries with delta confluence"
    day_types: [BDay, Neutral]
    direction: both

  nwog_gap_fill:
    enabled: true
    description: "NWOG Gap Fill — Monday weekly gap fill with VWAP + acceptance filters"
    day_types: [all]
    direction: both
    trail:
      enabled: false         # gap fill needs to run to Friday close target — trail kills it

  pdh_pdl_reaction:
    enabled: true
    description: "PDH/PDL Reaction — failed auction + rejection touch at prior day H/L"
    day_types: [all]
    direction: both
    setup_modes: [A, C]
    stop_mode: spike
    target_mode: 2r
    require_bias_alignment: true
    poke_min: 5
    trail:
      enabled: false         # outsized winners ($2,508 avg) need room — trail cuts $35K

  ndog_gap_fill:
    enabled: true
    description: "NDOG Gap Fill — daily overnight gap fill with VWAP confirmation"
    day_types: [all]
    direction: both
    trail:
      enabled: false         # gap fill needs to reach prior close — trail cuts the fill

  single_print_gap_fill:
    enabled: false
    description: "SP Gap Fill — DISABLED: PF 0.95, zone detection mismatch with study (30.4% WR vs study 69.2%)"
    day_types: [all]
    direction: both

  poor_highlow_repair:
    enabled: false
    description: "Poor HL Repair — DISABLED: PF 1.09, 31 trades. Needs enrichment data fix for detection"
    day_types: [all]
    direction: long

  cvd_divergence:
    enabled: false
    description: "CVD Divergence — DISABLED: PF 0.78, 19.4% WR. No config fix reaches PF 1.5"
    day_types: [all]
    direction: long

  rth_gap_fill:
    enabled: false
    description: "RTH Gap Fill — DISABLED: PF 0.83-1.42 across configs. VWAP confirm = 14t PF 0.83; gap_2x = 102t PF 1.42"
    day_types: [all]
    direction: both

  double_distribution:
    enabled: false
    description: "Double Distribution — DISABLED: PF 1.30, 31 trades. LONG side losing (-$337)"
    day_types: [all]
    direction: both

  va_edge_fade:
    enabled: true
    description: "VA Edge Fade — SHORT-only at prior VAH rejection, edge+20 stop, 3R target"
    day_types: [all]
    direction: short
    trail:
      enabled: false         # 3.96:1 win/loss ratio requires letting winners run to 3R target

  ib_edge_fade:
    enabled: true
    description: "IB Edge Fade — fade IBL rejection LONG only (PF 1.84), SHORT disabled (PF 1.20)"
    day_types: [all]
    direction: long
    trail:
      enabled: false         # marginal benefit (+$1.8K, 12% activate) — not worth the complexity

  ib_retracement:
    enabled: false
    description: "IB Retracement — fib pullback after IB extension (REJECTED by study, all configs negative)"
    day_types: [all]
    direction: both
