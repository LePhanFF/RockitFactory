# Filter pipeline configuration
# Each filter is a generic type parameterized by rules.
# To add/modify rules, edit this YAML — no code changes needed.

pipeline:
  bias_alignment:
    enabled: true
    neutral_passes: true  # neutral/flat bias = no filter (pass through)

  day_type_gate:
    enabled: true
    rules:
      - strategy: "80P Rule"
        blocked_day_types: [neutral, neutral_range, "Neutral Range"]
      - strategy: "B-Day"
        blocked_day_types: [trend_up, trend_down, "Trend Up", "Trend Down"]

  anti_chase:
    enabled: false  # Disabled — killed 53/72 80P signals including profitable setups (Run E finding)
    # 80P is mean-reversion; trading WITH bias is legitimate, not chasing.
    # Let the LLM debate layer handle nuanced signal filtering instead.
    rules: []

  agent_evaluation:
    enabled: false  # Enable via A/B test script, not by default
    take_threshold: 0.3
    skip_threshold: 0.1
    llm_debate:
      enabled: false          # Toggle LLM debate separately from deterministic agents
      endpoint: "http://spark-ai:11434/v1"
      model: "qwen3.5:35b-a3b"
      timeout: 180
      max_tokens: 4000
