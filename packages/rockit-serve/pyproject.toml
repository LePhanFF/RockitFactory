[project]
name = "rockit-serve"
version = "0.1.0"
description = "FastAPI signals API: annotations, trade setups, WebSocket streaming"
requires-python = ">=3.11"
dependencies = [
    "rockit-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
]

[tool.uv.sources]
rockit-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rockit_serve"]
