[project]
name = "rockit-serve"
version = "0.2.0"
description = "FastAPI trading API: live signals, multi-user auth, bot subscriptions, WebSocket streaming"
requires-python = ">=3.11"
dependencies = [
    "rockit-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.20",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    "bcrypt>=4.0,<5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
]

[tool.uv.sources]
rockit-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rockit_serve"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
