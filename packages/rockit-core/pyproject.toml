[project]
name = "rockit-core"
version = "0.1.0"
description = "Core trading library: strategies, backtest engine, deterministic modules, filters, indicators"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "duckdb>=1.0",
    "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rockit_core"]
