[project]
name = "rockit-pipeline"
version = "0.1.0"
description = "Orchestration pipeline: research → backtest → train → deploy automation"
requires-python = ">=3.11"
dependencies = [
    "rockit-core",
]

[tool.uv.sources]
rockit-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rockit_pipeline"]
