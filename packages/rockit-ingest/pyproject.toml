[project]
name = "rockit-ingest"
version = "0.1.0"
description = "Data ingestion: CSV upload, GCS sync, JSONL processing"
requires-python = ">=3.11"
dependencies = [
    "rockit-core",
]

[tool.uv.sources]
rockit-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rockit_ingest"]
